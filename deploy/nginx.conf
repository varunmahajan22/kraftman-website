# ═══════════════════════════════════════════════════════════════
# Nginx Configuration for Kraftman Packaging
# - kraftmanpackaging.com       → Website (Node.js :3000)
# - erp.kraftmanpackaging.com   → ERP     (Next.js :3001)
# ═══════════════════════════════════════════════════════════════

# ── Website: kraftmanpackaging.com ────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name kraftmanpackaging.com www.kraftmanpackaging.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kraftmanpackaging.com www.kraftmanpackaging.com;

    # SSL (managed by certbot — update paths after running certbot)
    ssl_certificate     /etc/letsencrypt/live/kraftmanpackaging.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kraftmanpackaging.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → non-www
    if ($host = www.kraftmanpackaging.com) {
        return 301 https://kraftmanpackaging.com$request_uri;
    }

    # Static uploads — served directly by Nginx
    location /uploads/ {
        alias /var/www/kraftman-website/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?|ttf)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy everything else to Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 10M;
}


# ── ERP: erp.kraftmanpackaging.com ───────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name erp.kraftmanpackaging.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.kraftmanpackaging.com;

    # SSL (managed by certbot — update paths after running certbot)
    ssl_certificate     /etc/letsencrypt/live/erp.kraftmanpackaging.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.kraftmanpackaging.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 20M;
}
